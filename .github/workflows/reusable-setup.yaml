name: Setup variables
run-name: Setup variables

on:
  workflow_call:
    inputs:
      base_branch:
        description: 'Base branch (e.g. github.base_ref or github.ref_name)'
        required: true
        type: string
      full_build_and_check:
        description: 'Whether to run a full build and check'
        required: true
        type: string
      otp_sbom_version:
        description: 'OTP SBOM version (tag name or SHA)'
        required: true
        type: string
    outputs:
      base_branch:
        description: 'The base branch'
        value: ${{ jobs.setup.outputs.base_branch }}
      full_build_and_check:
        description: 'Whether full build and check is enabled'
        value: ${{ jobs.setup.outputs.full_build_and_check }}
      otp_sbom_version:
        description: 'OTP SBOM version'
        value: ${{ jobs.setup.outputs.otp_sbom_version }}
      docs_base_url:
        description: 'Base URL for documentation links'
        value: ${{ jobs.setup.outputs.docs_base_url }}
      tag:
        description: 'Git tag (stripped of refs/tags/ prefix)'
        value: ${{ jobs.setup.outputs.tag }}
      vsn:
        description: 'OTP version (stripped of OTP- prefix)'
        value: ${{ jobs.setup.outputs.vsn }}

permissions:
  contents: read

jobs:
  setup:
    name: Setup variables
    runs-on: ubuntu-latest
    outputs:
      base_branch:          ${{ steps.setup.outputs.base_branch }}
      full_build_and_check: ${{ steps.setup.outputs.full_build_and_check }}
      otp_sbom_version:     ${{ steps.setup.outputs.otp_sbom_version }}
      docs_base_url:        ${{ steps.setup.outputs.docs_base_url }}
      tag:                  ${{ steps.setup.outputs.tag }}
      vsn:                  ${{ steps.setup.outputs.vsn }}
    steps:
      - id: setup
        # github.event.pull_request.head.ref is potentially untrusted.
        # We avoid using it directly in inline scripts; pass it through
        # an environment variable instead.
        env:
          EVENT_NAME:          ${{ github.event_name }}
          PR_REPO:             ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_REF:         ${{ github.event.pull_request.head.ref }}
          REPO:                ${{ github.repository }}
          REF_NAME:            ${{ github.ref_name }}
          BASE_BRANCH:         ${{ inputs.base_branch }}
          FULL_BUILD_AND_CHECK: ${{ inputs.full_build_and_check }}
          OTP_SBOM_VERSION:    ${{ inputs.otp_sbom_version }}
        run: |
          echo "base_branch=${BASE_BRANCH}"               >> "$GITHUB_OUTPUT"
          echo "full_build_and_check=${FULL_BUILD_AND_CHECK}" >> "$GITHUB_OUTPUT"
          echo "otp_sbom_version=${OTP_SBOM_VERSION}"     >> "$GITHUB_OUTPUT"

          TAG=${GITHUB_REF#refs/tags/}
          VSN=${TAG#OTP-}
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "vsn=${VSN}" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "docs_base_url=${PR_REPO}/blob/${PR_HEAD_REF}/" >> "$GITHUB_OUTPUT"
          else
            echo "docs_base_url=${REPO}/blob/${REF_NAME}/"       >> "$GITHUB_OUTPUT"
          fi
